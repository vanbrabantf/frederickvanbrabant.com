{{ define "main" }}
  <header
    class="py-16 md:py-24 border-b border-gray-100 px-4 bg-[#004526]/[0.02]">
    <div class="max-w-[1110px] mx-auto text-center">
      <p class="uppercase tracking-[0.4em] text-[10px] text-gray-400 mb-4">
        Index
      </p>
      <h1
        class="serif text-5xl md:text-7xl text-[#004526] italic lowercase tracking-tight leading-tight">
        {{ .Title }}
      </h1>
    </div>
  </header>

  <main class="max-w-[1110px] mx-auto px-4 py-20 md:py-32">
    <div class="max-w-4xl mx-auto">
      <div
        class="grid grid-cols-1 md:grid-cols-2 gap-x-16 gap-y-12 md:gap-y-20">
        {{ range .Data.Terms.ByCount }}
          <article class="group relative pb-8 border-b border-gray-100">
            <a
              href="{{ .Page.Permalink }}"
              class="flex items-end justify-between">
              <div class="flex flex-col">
                <span
                  class="serif italic text-4xl text-[#004526] opacity-10 mb-2 group-hover:opacity-30 transition-opacity duration-500">
                  {{ printf "%02d" .Count }}
                </span>

                <h2
                  class="serif text-3xl md:text-4xl text-[#004526] lowercase group-hover:italic transition-all duration-300">
                  {{ .Page.Title }}
                </h2>
              </div>

              <div
                class="text-[#004526] opacity-0 group-hover:opacity-100 group-hover:translate-x-2 transition-all duration-500 transform pb-2">
                <span class="text-2xl">→</span>
              </div>
            </a>

            {{ range first 1 .Pages }}
              <p
                class="mt-4 uppercase tracking-[0.2em] text-[8px] text-gray-400">
                Latest: <span class="text-gray-600">{{ .Title }}</span>
              </p>
            {{ end }}

          </article>
        {{ end }}
      </div>

      <div class="mt-32 text-center">
        <p class="sans text-[10px] uppercase tracking-[0.3em] text-gray-300">
          Select a collection to view all related entries
        </p>
      </div>
    </div>
  </main>
{{ end }}
